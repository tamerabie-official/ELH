<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#a78bfa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>English Learning Hub - اختبار تحديد المستوى</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg1: #fff8fb; --bg2: #eef7ff; --ink: #203047; --muted: #6b7a90;
      --card: rgba(255,255,255,0.82); --shadow: 0 16px 40px rgba(35,55,90,0.10);
      --glass: rgba(255,255,255,0.78); --radius: 28px;
      --a1: #ff7aa2; --a2: #6cc7ff; --a3: #7ed957; --a4: #ffb347;
      --a5: #a78bfa; --a6: #59d6c7;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Cairo',sans-serif;color:var(--ink);
      background:radial-gradient(circle at 10% 20%,rgba(167,139,250,.15),transparent 30%),
        radial-gradient(circle at 90% 10%,rgba(108,199,255,.12),transparent 26%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased
    }

    .page{max-width:560px;margin:0 auto;padding:20px 18px 40px;min-height:100vh}

    /* ===== HEADER ===== */
    .test-header{
      text-align:center;margin-bottom:24px;padding:16px;
      background:var(--glass);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.8);border-radius:var(--radius);
      box-shadow:var(--shadow)
    }
    .test-header h1{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--a5),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .test-header p{color:var(--muted);font-size:.9rem;font-weight:600;margin-top:4px}

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      background:var(--glass);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.8);border-radius:999px;
      padding:6px;margin-bottom:20px;box-shadow:var(--shadow);position:relative
    }
    .progress-track{height:12px;background:#eef3fb;border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--a3),var(--a2),var(--a5));transition:width .5s ease;width:0%}
    .progress-label{text-align:center;font-size:.8rem;font-weight:700;color:var(--muted);margin-top:6px}

    /* ===== QUESTION CARD ===== */
    .question-card{
      background:var(--glass);backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.8);border-radius:var(--radius);
      padding:28px 22px;box-shadow:var(--shadow);animation:slideIn .4s ease-out
    }
    @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    [dir="ltr"] .question-card{animation:slideInL .4s ease-out}
    @keyframes slideInL{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}

    .category-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(32,48,71,.06);padding:6px 14px;border-radius:999px;font-weight:800;font-size:.8rem;margin-bottom:14px}
    .difficulty-badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:700;margin-right:8px}
    .diff-easy{background:rgba(126,217,87,.15);color:#2d8f2d}.diff-medium{background:rgba(255,179,71,.15);color:#b87a00}.diff-hard{background:rgba(255,107,107,.15);color:#cc3333}
    .question-text{font-size:1.3rem;font-weight:800;line-height:1.5;margin-bottom:20px;color:var(--ink)}
    .question-text .highlight{background:linear-gradient(135deg,rgba(108,199,255,.2),rgba(167,139,250,.2));padding:2px 8px;border-radius:8px;font-weight:900}

    /* ===== OPTIONS ===== */
    .options{display:flex;flex-direction:column;gap:12px}
    .option-btn{display:flex;align-items:center;gap:12px;padding:16px 20px;border:2px solid rgba(32,48,71,.06);border-radius:20px;background:rgba(255,255,255,.6);cursor:pointer;transition:all .25s ease;font-family:'Cairo',sans-serif;font-size:1rem;font-weight:700;color:var(--ink);text-align:left;width:100%}
    [dir="ltr"] .option-btn{text-align:left}
    .option-btn:hover{border-color:var(--a2);background:rgba(108,199,255,.08);transform:translateX(-4px)}
    [dir="ltr"] .option-btn:hover{transform:translateX(4px)}
    .option-btn:active{transform:scale(.98)}
    .option-letter{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--a5),var(--a2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;flex-shrink:0}

    /* ===== FEEDBACK ===== */
    .feedback{text-align:center;padding:16px;border-radius:16px;margin-top:16px;font-weight:700;font-size:.95rem;animation:popIn .3s ease}
    @keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
    .feedback.correct{background:rgba(126,217,87,.12);border:1px solid rgba(126,217,87,.3);color:#2d8f2d}
    .feedback.wrong{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);color:#cc3333}
    .option-btn.correct-answer{border-color:var(--a3);background:rgba(126,217,87,.15)}
    .option-btn.wrong-answer{border-color:var(--error);background:rgba(255,107,107,.1);opacity:.7}

    /* ===== COMPLETION SCREEN ===== */
    .completion-card{text-align:center;padding:40px 24px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.8);border-radius:var(--radius);box-shadow:var(--shadow);animation:fadeUp .6s ease-out}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .completion-card .big-emoji{font-size:5rem;display:block;margin-bottom:16px;animation:bounce 2s ease infinite}
    .completion-card h2{font-size:1.8rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--a3),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .completion-card .level-result{font-size:1.3rem;font-weight:800;color:var(--ink);margin:12px 0;padding:12px 20px;background:rgba(255,255,255,.6);border-radius:16px;display:inline-block}
    .completion-card .details{color:var(--muted);font-size:.95rem;line-height:1.8;margin:16px 0}
    .completion-card .btn-continue{display:inline-flex;align-items:center;gap:8px;padding:16px 32px;border:none;border-radius:20px;background:linear-gradient(135deg,var(--a5),var(--a2));color:#fff;font-family:'Cairo',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(167,139,250,.35);transition:all .3s ease;text-decoration:none;margin-top:20px}
    .completion-card .btn-continue:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(167,139,250,.45)}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
    .stat-box{background:rgba(255,255,255,.5);border-radius:16px;padding:14px 10px;border:1px solid rgba(32,48,71,.06)}
    .stat-box strong{display:block;font-size:1.4rem;color:var(--ink)}
    .stat-box span{font-size:.8rem;color:var(--muted);font-weight:600}

    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @media(max-width:380px){.page{padding:14px}.question-text{font-size:1.1rem}.option-btn{padding:12px 14px;font-size:.9rem}}
  </style>
</head>
<body>
  <main class="page">
    <div class="test-header">
      <h1>🧠 اختبار تحديد المستوى</h1>
      <p>اختبار ذكي يتكيف مع مستواك - يجيب تامر ربيع على كل سؤال</p>
    </div>
    <div class="progress-container" id="progressContainer">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">السؤال 1 من 12</div>
    </div>
    <div id="questionContainer"></div>
    <div id="completionScreen" style="display:none"></div>
  </main>
<script>
