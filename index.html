<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ff7aa2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>ELH - تسجيل الدخول</title>
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    :root {
      --bg1: #fff8fb; --bg2: #eef7ff; --ink: #203047; --muted: #6b7a90;
      --card: rgba(255, 255, 255, 0.82); --shadow: 0 16px 40px rgba(35, 55, 90, 0.10);
      --glass: rgba(255, 255, 255, 0.78); --radius: 28px; --a1: #ff7aa2; --a2: #6cc7ff;
      --a3: #7ed957; --a4: #ffb347; --a5: #a78bfa; --a6: #59d6c7; --error: #ff6b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif; color: var(--ink);
      background: radial-gradient(circle at 10% 20%, rgba(255,122,162,0.18), transparent 30%),
        radial-gradient(circle at 90% 10%, rgba(108,199,255,0.15), transparent 26%),
        radial-gradient(circle at 50% 80%, rgba(126,217,87,0.12), transparent 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    .lang-toggle {
      position: fixed; top: 16px; left: 16px; z-index: 100;
      background: var(--glass); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8); border-radius: 999px;
      padding: 8px 16px; font-family: 'Cairo', sans-serif; font-weight: 800;
      font-size: 0.9rem; cursor: pointer; box-shadow: var(--shadow);
      color: var(--ink); transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;
    }
    .lang-toggle:hover { transform: scale(1.05); }
    .lang-toggle .globe { font-size: 1.1rem; }
    .page { max-width: 520px; margin: 0 auto; padding: 80px 20px 40px; min-height: 100vh; }
    .glass-card {
      background: var(--glass); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow); border-radius: var(--radius); padding: 32px 24px; animation: fadeUp 0.6s ease-out;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    
    .brand { text-align: center; margin-bottom: 20px; }
    .brand-logo { font-size: 3.5rem; line-height: 1; margin-bottom: 10px; display: block; animation: bounce 2s ease infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .brand h1 { font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 900; background: linear-gradient(135deg, var(--a1), var(--a4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
    .brand p { color: var(--muted); font-size: 0.95rem; font-weight: 600; line-height: 1.5; }

    /* ===== TOGGLE BUTTONS (Login / Register) ===== */
    .auth-toggle { display: flex; background: rgba(255,255,255,0.5); border-radius: 999px; padding: 4px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.8); }
    .auth-toggle button { flex: 1; padding: 10px; border: none; border-radius: 999px; background: transparent; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 1rem; color: var(--muted); cursor: pointer; transition: all 0.3s ease; }
    .auth-toggle button.active { background: var(--glass); box-shadow: var(--shadow); color: var(--ink); transform: scale(1.02); }

    /* ===== FORM ELEMENTS ===== */
    .form-group { margin-bottom: 18px; position: relative; }
    .form-group label { display: block; font-weight: 700; font-size: 0.92rem; margin-bottom: 8px; color: var(--ink); }
    .form-group input, .form-group select {
      width: 100%; padding: 14px 18px; border: 2px solid rgba(32, 48, 71, 0.08);
      border-radius: 18px; font-family: 'Cairo', sans-serif; font-size: 1rem;
      font-weight: 600; color: var(--ink); background: rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease; outline: none;
    }
    .form-group input:focus { border-color: var(--a2); box-shadow: 0 0 0 4px rgba(108, 199, 255, 0.15); background: rgba(255, 255, 255, 0.9); }
    .form-group input::placeholder { color: #b0bec5; font-weight: 400; }
    
    /* ===== BUTTONS ===== */
    .btn-submit { width: 100%; padding: 16px 24px; border: none; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 1.1rem; font-weight: 800; color: #fff; background: linear-gradient(135deg, var(--a1), #ff9f68); cursor: pointer; box-shadow: 0 10px 30px rgba(255, 122, 162, 0.35); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    .btn-submit:hover { transform: translateY(-3px) scale(1.01); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: linear-gradient(135deg, var(--a2), #4db8ff); }

    /* ===== HIDDEN FIELDS (FOR REGISTER) ===== */
    .hidden-fields { display: none; animation: fadeUp 0.4s ease; }
    .hidden-fields.show { display: block; }

    /* ===== SPINNER & ERROR ===== */
    .spinner { width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: rgba(255, 107, 107, 0.08); border: 1px solid rgba(255, 107, 107, 0.2); color: var(--error); padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; font-weight: 600; margin-bottom: 16px; display: none; text-align: center; }
    .error-msg.show { display: block; animation: shake 0.4s ease; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

    /* ===== SUCCESS OVERLAY ===== */
    .success-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); z-index: 200; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 40px 24px; animation: fadeIn 0.4s ease; }
    .success-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .success-overlay .success-icon { font-size: 5rem; animation: popIn 0.5s ease 0.2s both; }
    @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    .success-overlay h2 { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--a3), var(--a2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 16px 0 8px; }
    .success-overlay p { color: var(--muted); font-size: 1rem; font-weight: 600; max-width: 360px; line-height: 1.6; }
    .success-overlay .btn-continue { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border: none; border-radius: 20px; background: linear-gradient(135deg, var(--a5), var(--a2)); color: #fff; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(167, 139, 250, 0.35); transition: all 0.3s ease; margin-top: 12px; text-decoration: none; }

    /* ===== FLOATING PARTICLES ===== */
    .particle { position: fixed; border-radius: 50%; opacity: 0.3; pointer-events: none; animation: float 8s ease-in-out infinite; }
    .particle:nth-child(1) { width: 60px; height: 60px; background: var(--a1); top: 10%; left: 5%; animation-delay: 0s; }
    .particle:nth-child(2) { width: 40px; height: 40px; background: var(--a2); top: 60%; left: 85%; animation-delay: 2s; }
    @media (max-width: 380px) { .page { padding: 70px 14px 30px; } .glass-card { padding: 24px 16px; border-radius: 22px; } }
  </style>
</head><body>
  <div class="particle"></div>
  <div class="particle"></div>

  <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">
    <span class="globe">🌐</span>
    <span id="langLabel">English</span>
  </button>

  <main class="page">
    <div class="glass-card">
      <div class="brand">
        <span class="brand-logo">🤖</span>
        <h1 data-ar="ELH - منصة التعلم" data-en="ELH - Learning Hub">ELH - منصة التعلم</h1>
        <p data-ar="سجل أو ادخل باسم المستخدم" data-en="Register or Login with User ID">سجل أو ادخل باسم المستخدم</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <!-- Toggle Buttons -->
      <div class="auth-toggle" id="authToggle">
        <button class="active" id="btnLogin" onclick="switchAuth('login')" data-ar="دخول" data-en="Login">دخول</button>
        <button id="btnRegister" onclick="switchAuth('register')" data-ar="تسجيل جديد" data-en="Register">تسجيل جديد</button>
      </div>

      <form id="authForm" novalidate>
        <!-- User ID (مشترك للدخول والتسجيل) -->
        <div class="form-group">
          <label><span data-ar="🆔 اسم المستخدم" data-en="🆔 User ID">🆔 اسم المستخدم</span></label>
          <input type="text" id="userId" required data-ar-placeholder="اكتب اسم المستخدم..." data-en-placeholder="Enter your User ID..." placeholder="اكتب اسم المستخدم..." />
        </div>

        <!-- Full Name (فقط للتسجيل) -->
        <div class="form-group hidden-fields" id="fieldFullName">
          <label><span data-ar="📛 الاسم بالكامل" data-en="📛 Full Name">📛 الاسم بالكامل</span></label>
          <input type="text" id="fullName" data-ar-placeholder="اكتب الاسم بالكامل..." data-en-placeholder="Enter full name..." placeholder="اكتب الاسم بالكامل..." />
        </div>

        <!-- WhatsApp (فقط للتسجيل) -->
        <div class="form-group hidden-fields" id="fieldWhatsapp">
          <label><span data-ar="📱 واتساب ولي الأمر" data-en="📱 Parent's WhatsApp">📱 واتساب ولي الأمر</span></label>
          <input type="tel" id="whatsapp" data-ar-placeholder="مثال: 01012345678" data-en-placeholder="e.g., 01012345678" placeholder="مثال: 01012345678" />
        </div>

        <!-- Classroom & Relationship (فقط للتسجيل) -->
        <div class="form-group hidden-fields" id="fieldClassroom">
          <label><span data-ar="🎓 الصف الدراسي" data-en="🎓 Classroom">🎓 الصف الدراسي</span></label>
          <select id="classroom">
            <option value="" data-ar="اختر الصف..." data-en="Select classroom...">اختر الصف...</option>
            <option value="primary_1" data-ar="أول ابتدائي" data-en="Primary 1">أول ابتدائي</option>
            <option value="primary_2" data-ar="ثاني ابتدائي" data-en="Primary 2">ثاني ابتدائي</option>
            <option value="primary_3" data-ar="ثالث ابتدائي" data-en="Primary 3">ثالث ابتدائي</option>
            <option value="primary_4" data-ar="رابع ابتدائي" data-en="Primary 4">رابع ابتدائي</option>
            <option value="prep_1" data-ar="أول إعدادي" data-en="Prep 1">أول إعدادي</option>
          </select>
        </div>

        <div class="form-group hidden-fields" id="fieldRelationship">
          <label><span data-ar="👨‍👩‍👦 علاقتك بالطالب" data-en="👨‍👩‍👦 Your Relationship">👨‍👩‍👦 علاقتك بالطالب</span></label>
          <div class="radio-group">
            <div class="radio-option"><input type="radio" id="father" name="relationship" value="father" /><label for="father">👨 أب</label></div>
            <div class="radio-option"><input type="radio" id="mother" name="relationship" value="mother" /><label for="mother">👩 أم</label></div>
            <div class="radio-option"><input type="radio" id="other" name="relationship" value="other" /><label for="other">👤 أخرى</label></div>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-submit" id="submitBtn">
          <span data-ar="🚀 دخول" data-en="🚀 Login">🚀 دخول</span>
        </button>
      </form>
    </div>
  </main>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="confetti" id="confetti"></div>
    <span class="success-icon">🎉</span>
    <h2 data-ar="أهلاً بيك في ELH!" data-en="Welcome to ELH!">أهلاً بيك في ELH!</h2>
    <p data-ar="جاري تحميل ملفك..." data-en="Loading your profile...">جاري تحميل ملفك...</p>
    <a href="#" class="btn-continue" id="nextBtn">
      <span>📝</span>
      <span data-ar="الذهاب للوحة التحكم" data-en="Go to Dashboard">الذهاب للوحة التحكم</span>
    </a>
  </div>

<script>// ======================================================================
// SUPABASE CONFIG
// ======================================================================
const SUPABASE_URL = 'https://rwtdoefmhwaakrxmwklb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3dGRvZWZtaHdhYWtyeG13a2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1ODEwNDYsImV4cCI6MjA5OTE1NzA0Nn0.g8d6_uEeRNf80AwjgfX3AOuSRSJzm4brOTD8fVPnC1A';
const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

// ======================================================================
// STATE & LANGUAGE
// ======================================================================
let currentLang = 'ar';
let authMode = 'login'; // 'login' or 'register'

function toggleLanguage() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  const html = document.documentElement;
  html.lang = currentLang;
  html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('langLabel').textContent = currentLang === 'ar' ? 'English' : 'عربي';
  document.querySelectorAll('[data-ar]').forEach(el => {
    const text = currentLang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
    if (text) el.textContent = text;
  });
  document.querySelectorAll('[data-ar-placeholder]').forEach(el => {
    const placeholder = currentLang === 'ar' ? el.getAttribute('data-ar-placeholder') : el.getAttribute('data-en-placeholder');
    if (placeholder) el.placeholder = placeholder;
  });
  updateButtonText();
}

function updateButtonText() {
  const btn = document.getElementById('submitBtn');
  if (authMode === 'login') {
    btn.innerHTML = currentLang === 'ar' ? '<span>🚀 دخول</span>' : '<span>🚀 Login</span>';
  } else {
    btn.innerHTML = currentLang === 'ar' ? '<span>🚀 تسجيل جديد</span>' : '<span>🚀 Register</span>';
  }
}

// ======================================================================
// SWITCH AUTH MODE
// ======================================================================
function switchAuth(mode) {
  authMode = mode;
  document.getElementById('btnLogin').classList.toggle('active', mode === 'login');
  document.getElementById('btnRegister').classList.toggle('active', mode === 'register');
  
  const fields = ['fieldFullName', 'fieldWhatsapp', 'fieldClassroom', 'fieldRelationship'];
  fields.forEach(id => {
    document.getElementById(id).classList.toggle('show', mode === 'register');
  });

  // تحديث النص والأزرار بناءً على الوضع
  updateButtonText();
  document.getElementById('errorMsg').classList.remove('show');
}

// ======================================================================
// CONFETTI ANIMATION
// ======================================================================
function createConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#ff7aa2', '#6cc7ff', '#7ed957', '#ffb347', '#a78bfa'];
  for (let i = 0; i < 50; i++) {
    const conf = document.createElement('div');
    conf.style.cssText = `
      position: absolute; width: ${6 + Math.random() * 8}px; height: ${6 + Math.random() * 8}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      left: ${Math.random() * 100}%; top: -10px;
      animation: confettiFall ${2 + Math.random() * 3}s ease-out ${Math.random() * 2}s forwards;
    `;
    container.appendChild(conf);
  }
  if (!document.getElementById('confettiStyle')) {
    const style = document.createElement('style');
    style.id = 'confettiStyle';
    style.textContent = `@keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }`;
    document.head.appendChild(style);
  }
}

// ======================================================================
// AUTH FORM SUBMISSION (Login OR Register)
// ======================================================================
document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('errorMsg');
  errorEl.classList.remove('show');

  const userId = document.getElementById('userId').value.trim().toLowerCase();
  if (!userId || userId.length < 3) {
    showError(currentLang === 'ar' ? '⚠️ اسم المستخدم 3 أحرف على الأقل' : '⚠️ User ID must be at least 3 chars');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  if (authMode === 'login') {
    await handleLogin(userId, btn, errorEl);
  } else {
    await handleRegister(userId, btn, errorEl);
  }
});

// ======================================================================
// HANDLE LOGIN (Check existing user)
// ======================================================================
async function handleLogin(userId, btn, errorEl) {
  try {
    // 1. Check Supabase
    let userData = null;
    if (supabase) {
      const { data, error } = await supabase.from('students').select('*').eq('user_id', userId).maybeSingle();
      if (error) throw error;
      userData = data;
    }

    // 2. If not in Supabase, check localStorage fallback
    if (!userData) {
      const students = JSON.parse(localStorage.getItem('elh_students') || '[]');
      userData = students.find(s => s.user_id === userId);
    }

    if (!userData) {
      throw new Error('notfound');
    }

    // 3. Save to localStorage and redirect
    localStorage.setItem('elh_current_student', JSON.stringify(userData));
    
    // Show success animation
    showSuccess();
    // Redirect after 1.5 seconds
    setTimeout(() => {
      if (userData.test_completed) {
        window.location.href = 'student_dashboard.html';
      } else {
        window.location.href = 'placement-test.html';
      }
    }, 1500);

  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = currentLang === 'ar' ? '<span>🚀 دخول</span>' : '<span>🚀 Login</span>';
    if (err.message === 'notfound') {
      showError(currentLang === 'ar' ? '⚠️ اسم المستخدم غير موجود. جرب التسجيل.' : '⚠️ User not found. Please register.');
    } else {
      showError(currentLang === 'ar' ? '⚠️ خطأ في الاتصال. تأكد من النت.' : '⚠️ Connection error. Check your internet.');
    }
  }
}

// ======================================================================
// HANDLE REGISTER (Create new user)
// ======================================================================
async function handleRegister(userId, btn, errorEl) {
  const fullName = document.getElementById('fullName').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const classroom = document.getElementById('classroom').value;
  const relationship = document.querySelector('input[name="relationship"]:checked');

  if (!fullName || !whatsapp || !classroom || !relationship) {
    btn.disabled = false; btn.innerHTML = currentLang === 'ar' ? '<span>🚀 تسجيل جديد</span>' : '<span>🚀 Register</span>';
    showError(currentLang === 'ar' ? '⚠️ يرجى إكمال جميع الحقول' : '⚠️ Please fill all fields');
    return;
  }

  const cleanedPhone = whatsapp.replace(/\s/g, '').replace(/^0/, '20');
  if (!/^201[0-9]{9}$/.test(cleanedPhone)) {
    btn.disabled = false; btn.innerHTML = currentLang === 'ar' ? '<span>🚀 تسجيل جديد</span>' : '<span>🚀 Register</span>';
    showError(currentLang === 'ar' ? '⚠️ رقم واتساب غير صحيح' : '⚠️ Invalid WhatsApp number');
    return;
  }

  try {
    const studentData = {
      full_name: fullName, user_id: userId, whatsapp: cleanedPhone,
      classroom: classroom, relationship: relationship.value,
      level: 1, test_scores: {}, test_completed: false, language: currentLang,
      created_at: new Date().toISOString()
    };

    // Save to Supabase
    if (supabase) {
      const { error } = await supabase.from('students').insert([studentData]);
      if (error) {
        if (error.code === '23505') throw new Error('duplicate');
        throw error;
      }
    }

    // Save to localStorage fallback
    const students = JSON.parse(localStorage.getItem('elh_students') || '[]');
    const exists = students.find(s => s.user_id === userId);
    if (exists) throw new Error('duplicate');
    students.push({ ...studentData, id: Date.now() });
    localStorage.setItem('elh_students', JSON.stringify(students));
    localStorage.setItem('elh_current_student', JSON.stringify(studentData));

    // Show success and redirect
    showSuccess();
    setTimeout(() => {
      window.location.href = 'placement-test.html';
    }, 1500);

  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = currentLang === 'ar' ? '<span>🚀 تسجيل جديد</span>' : '<span>🚀 Register</span>';
    if (err.message === 'duplicate') {
      showError(currentLang === 'ar' ? '⚠️ اسم المستخدم مستخدم بالفعل' : '⚠️ Username already taken');
    } else {
      showError(currentLang === 'ar' ? '⚠️ خطأ في التسجيل. حاول لاحقاً.' : '⚠️ Registration error. Try again.');
    }
  }
}

// ======================================================================
// HELPERS
// ======================================================================
function showError(msg) {
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = msg;
  errorEl.classList.add('show');
}

function showSuccess() {
  document.getElementById('successOverlay').classList.add('show');
  createConfetti();
}

// Init: default to login mode
switchAuth('login');

// ======================================================================
// SERVICE WORKER
// ======================================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW:', err));
}
</script>
</body>
</html>
