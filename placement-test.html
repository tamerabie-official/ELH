    *{box-sizing:border-box;margin:0;padding:0}
    body{

        linear-gradient(180deg,var(--bg1),var(--bg2));
      min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased
    }

    .page{max-width:560px;margin:0 auto;padding:20px 18px 40px;min-height:100vh}

    /* ===== HEADER ===== */
    .test-header{
      text-align:center;margin-bottom:24px;padding:16px;
      background:var(--glass);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.8);border-radius:var(--radius);
      box-shadow:var(--shadow)
    }
    .test-header h1{
      font-size:1.4rem;font-weight:900;
      background:linear-gradient(135deg,var(--a5),var(--a2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
    }
    .test-header p{color:var(--muted);font-size:.9rem;font-weight:600;margin-top:4px}

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      background:var(--glass);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.8);border-radius:999px;
      padding:6px;margin-bottom:20px;box-shadow:var(--shadow);
      position:relative
    }
    .progress-track{
      height:12px;background:#eef3fb;border-radius:999px;overflow:hidden
    }
    .progress-fill{
      height:100%;border-radius:999px;
      background:linear-gradient(90deg,var(--a3),var(--a2),var(--a5));
      transition:width .5s ease;width:0%
    }
    .progress-label{
      text-align:center;font-size:.8rem;font-weight:700;color:var(--muted);margin-top:6px
    }

    /* ===== QUESTION CARD ===== */
    .question-card{
      background:var(--glass);backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.8);border-radius:var(--radius);
      padding:28px 22px;box-shadow:var(--shadow);
      animation:slideIn .4s ease-out
    }
    @keyframes slideIn{
      from{opacity:0;transform:translateX(30px)}
      to{opacity:1;transform:translateX(0)}
    }
    [dir="ltr"] .question-card{animation:slideInL .4s ease-out}
    @keyframes slideInL{
      from{opacity:0;transform:translateX(-30px)}
      to{opacity:1;transform:translateX(0)}
    }

    .category-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(32,48,71,.06);padding:6px 14px;border-radius:999px;
      font-weight:800;font-size:.8rem;margin-bottom:14px
    }
    .difficulty-badge{
      display:inline-block;padding:4px 10px;border-radius:999px;
      font-size:.75rem;font-weight:700;margin-right:8px
    }
    .diff-easy{background:rgba(126,217,87,.15);color:#2d8f2d}
    .diff-medium{background:rgba(255,179,71,.15);color:#b87a00}
    .diff-hard{background:rgba(255,107,107,.15);color:#cc3333}

    .question-text{
      font-size:1.3rem;font-weight:800;line-height:1.5;margin-bottom:20px;
      color:var(--ink)
    }
    .question-text .highlight{
      background:linear-gradient(135deg,rgba(108,199,255,.2),rgba(167,139,250,.2));
      padding:2px 8px;border-radius:8px;font-weight:900
    }

    /* ===== OPTIONS ===== */
    .options{display:flex;flex-direction:column;gap:12px}
    .option-btn{
      display:flex;align-items:center;gap:12px;
      padding:16px 20px;border:2px solid rgba(32,48,71,.06);
      border-radius:20px;background:rgba(255,255,255,.6);
      cursor:pointer;transition:all .25s ease;font-family:'Cairo',sans-serif;
      font-size:1rem;font-weight:700;color:var(--ink);text-align:left;
      width:100%
    }
    [dir="ltr"] .option-btn{text-align:left}
    .option-btn:hover{
      border-color:var(--a2);
      background:rgba(108,199,255,.08);
      transform:translateX(-4px)
    }
    [dir="ltr"] .option-btn:hover{transform:translateX(4px)}
    .option-btn:active{transform:scale(.98)}

    .option-letter{
      width:36px;height:36px;border-radius:12px;
      background:linear-gradient(135deg,var(--a5),var(--a2));
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:.9rem;flex-shrink:0
    }

    /* ===== FEEDBACK ===== */
    .feedback{
      text-align:center;padding:16px;border-radius:16px;
      margin-top:16px;font-weight:700;font-size:.95rem;
      animation:popIn .3s ease
    }
    @keyframes popIn{
      0%{transform:scale(.8);opacity:0}
      100%{transform:scale(1);opacity:1}
    }
    .feedback.correct{
      background:rgba(126,217,87,.12);border:1px solid rgba(126,217,87,.3);color:#2d8f2d
    }
    .feedback.wrong{
      background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);color:#cc3333
    }

    .option-btn.correct-answer{
      border-color:var(--a3);background:rgba(126,217,87,.15)
    }
    .option-btn.wrong-answer{
      border-color:var(--error);background:rgba(255,107,107,.1);opacity:.7
    }

    /* ===== COMPLETION SCREEN ===== */
    .completion-card{
      text-align:center;padding:40px 24px;
      background:var(--glass);backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.8);border-radius:var(--radius);
      box-shadow:var(--shadow);animation:fadeUp .6s ease-out
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(30px)}
      to{opacity:1;transform:translateY(0)}
    }
    .completion-card .big-emoji{font-size:5rem;display:block;margin-bottom:16px;animation:bounce 2s ease infinite}
    .completion-card h2{
      font-size:1.8rem;font-weight:900;margin-bottom:8px;
      background:linear-gradient(135deg,var(--a3),var(--a2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
    }
    .completion-card .level-result{
      font-size:1.3rem;font-weight:800;color:var(--ink);margin:12px 0;
      padding:12px 20px;background:rgba(255,255,255,.6);border-radius:16px;
      display:inline-block
    }
    .completion-card .details{
      color:var(--muted);font-size:.95rem;line-height:1.8;margin:16px 0
    }
    .completion-card .btn-continue{
      display:inline-flex;align-items:center;gap:8px;
      padding:16px 32px;border:none;border-radius:20px;
      background:linear-gradient(135deg,var(--a5),var(--a2));
      color:#fff;font-family:'Cairo',sans-serif;font-size:1.1rem;
      font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(167,139,250,.35);
      transition:all .3s ease;text-decoration:none;margin-top:20px
    }
    .completion-card .btn-continue:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(167,139,250,.45)}

    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
    .stat-box{
      background:rgba(255,255,255,.5);border-radius:16px;padding:14px 10px;
      border:1px solid rgba(32,48,71,.06)

    .stat-box strong{display:block;font-size:1.4rem;color:var(--ink)}
    .stat-box span{font-size:.8rem;color:var(--muted);font-weight:600}

    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ===== RESPONSIVE ===== */
    @media(max-width:380px){
      .page{padding:14px}
      .question-text{font-size:1.1rem}
      .option-btn{padding:12px 14px;font-size:.9rem}
    }
  </style>
</head>

// State
let currentDifficulty = INITIAL_DIFFICULTY;
let questionIndex = 0;
let score = 0;
let categoryScores = { vocabulary: 0, grammar: 0, phonics: 0, reading: 0, listening: 0 };
let categoryCounts = { vocabulary: 0, grammar: 0, phonics: 0, reading: 0, listening: 0 };
let usedQuestions = new Set();
let currentQuestion = null;
let isAnswering = false;

// Get random unused question at current difficulty
function getRandomQuestion(level) {
  const available = questionBank[level].filter((q, i) => {
    const key = `${level}-${i}`;
    return !usedQuestions.has(key);
  });

  if (available.length === 0) {
    // Fall back to adjacent level
    const altLevel = level > 3 ? level - 1 : level + 1;
    if (questionBank[altLevel]) {
      return { question: questionBank[altLevel][Math.floor(Math.random() * questionBank[altLevel].length)], actualLevel: altLevel };
    }
  }

  const q = available[Math.floor(Math.random() * available.length)];
  const idx = questionBank[level].indexOf(q);
  usedQuestions.add(`${level}-${idx}`);
  return { question: q, actualLevel: level };
}

function shuffleOptions(q) {
  const correctAnswer = q.options[currentLang][q.correct];
  const shuffled = [...q.options[currentLang]].sort(() => Math.random() - 0.5);
  const newCorrect = shuffled.indexOf(correctAnswer);
  return { shuffled, newCorrect };
}

function renderQuestion() {
  const container = document.getElementById('questionContainer');
  const result = getRandomQuestion(currentDifficulty);
  currentQuestion = result.question;

  const { shuffled, newCorrect } = shuffleOptions(currentQuestion);

  // Track category
  const cat = currentQuestion.category;
  categoryCounts[cat]++;

  // Update progress
  document.getElementById('progressFill').style.width = `${((questionIndex) / TOTAL_QUESTIONS) * 100}%`;
  document.getElementById('progressLabel').textContent =
    currentLang === 'ar'
      ? `السؤال ${questionIndex + 1} من ${TOTAL_QUESTIONS}`
      : `Question ${questionIndex + 1} of ${TOTAL_QUESTIONS}`;

  // Difficulty label
  const diffLabels = { 1: 'Easy', 2: 'Beginner', 3: 'Intermediate', 4: 'Upper', 5: 'Advanced' };
  const diffClasses = { 1: 'diff-easy', 2: 'diff-easy', 3: 'diff-medium', 4: 'diff-medium', 5: 'diff-hard' };

  const diffText = currentLang === 'ar'
    ? ['مبتدئ', 'مبتدئ+', 'متوسط', 'فوق المتوسط', 'متقدم'][currentDifficulty - 1]
    : diffLabels[currentDifficulty];

  const qText = currentQuestion.question[currentLang];
  const catLabel = currentQuestion.catLabel;
  const catIcon = currentQuestion.catIcon;

  let html = `
    <div class="question-card">
      <div>
        <span class="category-badge">${catIcon} ${catLabel}</span>
        <span class="difficulty-badge ${diffClasses[currentDifficulty]}">${diffText}</span>
      </div>
      <div class="question-text">${qText}</div>
      <div class="options">
  `;

  const letters = ['A', 'B', 'C', 'D'];
  shuffled.forEach((opt, i) => {
    html += `
      <button class="option-btn" onclick="checkAnswer(${i}, ${newCorrect}, this)" data-index="${i}">
        <span class="option-letter">${letters[i]}</span>
        <span>${opt}</span>
      </button>
    `;
  });

  html += `</div><div id="feedbackArea"></div></div>`;
  container.innerHTML = html;
  isAnswering = false;
}

function checkAnswer(selected, correct, btn) {
  if (isAnswering) return;
  isAnswering = true;

  const allBtns = document.querySelectorAll('.option-btn');
  const feedbackArea = document.getElementById('feedbackArea');

  // Mark correct/wrong
  allBtns.forEach(b => {
    const idx = parseInt(b.dataset.index);
    b.style.pointerEvents = 'none';
    if (idx === correct) {
      b.classList.add('correct-answer');
    }
    if (idx === selected && selected !== correct) {
      b.classList.add('wrong-answer');
    }
  });

  const isCorrect = selected === correct;
  if (isCorrect) {
    score++;
    categoryScores[currentQuestion.category]++;
  }

  // Feedback
  const explanation = currentQuestion.explanation[currentLang];
  feedbackArea.innerHTML = `
    <div class="feedback ${isCorrect ? 'correct' : 'wrong'}">
      ${isCorrect ? '✅ أحسنت! Great job!' : '❌ للأسف! Not quite!'}
      <br><small style="opacity:.8">${explanation}</small>
    </div>
  `;

  // Adaptive: adjust difficulty
  if (isCorrect && currentDifficulty < MAX_DIFFICULTY) {
    currentDifficulty++;
  } else if (!isCorrect && currentDifficulty > MIN_DIFFICULTY) {
    currentDifficulty--;
  }

  questionIndex++;

  // Next question or finish
  setTimeout(() => {
    if (questionIndex < TOTAL_QUESTIONS) {
      renderQuestion();
    } else {
      finishTest();
    }
  }, 2000);
}

function finishTest() {
  document.getElementById('progressContainer').style.display = 'none';
  document.getElementById('questionContainer').style.display = 'none';

  // Calculate level (1-5)
  const level = Math.min(5, Math.max(1, Math.round((score / TOTAL_QUESTIONS) * 4) + 1));
  const levelLabels = {
    1: { ar: 'مبتدئ (Beginner)', en: 'Beginner' },
    2: { ar: 'مبتدئ+ (Elementary)', en: 'Elementary' },
    3: { ar: 'متوسط (Intermediate)', en: 'Intermediate' },
    4: { ar: 'فوق المتوسط (Upper-Intermediate)', en: 'Upper-Intermediate' },
    5: { ar: 'متقدم (Advanced)', en: 'Advanced' }
  };

  // Calculate percentages per category
  const categoryPercentages = {};
  for (const cat in categoryCounts) {
    if (categoryCounts[cat] > 0) {
      categoryPercentages[cat] = Math.round((categoryScores[cat] / categoryCounts[cat]) * 100);
    } else {
      categoryPercentages[cat] = 0;
    }
  }

  // Save to Supabase and localStorage
  saveResult(level, categoryPercentages);

  const screen = document.getElementById('completionScreen');
  screen.style.display = 'block';
  screen.innerHTML = `
    <div class="completion-card">
      <span class="big-emoji">🏆</span>
      <h2 data-ar="اختبار تحديد المستوى مكتمل!" data-en="Placement Test Complete!">اختبار تحديد المستوى مكتمل!</h2>
      <div class="level-result" id="levelResult">
        ${currentLang === 'ar' ? 'مستواك:' : 'Your Level:'} ${levelLabels[level][currentLang]}
      </div>
      <div class="details">
        <span data-ar="إجابات صحيحة" data-en="Correct Answers">إجابات صحيحة</span>: <strong>${score} / ${TOTAL_QUESTIONS}</strong><br>
        <span data-ar="التصنيف محفوظ في قاعدة البيانات - غير ظاهر للطالب" data-en="Classification saved in database - not shown to student">التصنيف محفوظ في قاعدة البيانات - غير ظاهر للطالب</span>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <strong>${categoryPercentages.vocabulary || 0}%</strong>
          <span>Vocabulary</span>
        </div>
        <div class="stat-box">
          <strong>${categoryPercentages.grammar || 0}%</strong>
          <span>Grammar</span>
        </div>
        <div class="stat-box">
          <strong>${categoryPercentages.reading || 0}%</strong>
          <span>Reading</span>
        </div>
      </div>
      <a href="student_dashboard.html" class="btn-continue">
        <span>🎓</span>
        <span data-ar="الذهاب للوحة التحكم" data-en="Go to Dashboard">الذهاب للوحة التحكم</span>
      </a>
    </div>
  `;

  // Also change the header text
  document.querySelector('.test-header h1').textContent = currentLang === 'ar'
    ? '🎉 مبروك! تم تحديد المستوى'
    : '🎉 Congratulations! Level Set';
  document.querySelector('.test-header p').textContent = currentLang === 'ar'
    ? 'تم حفظ مستواك في قاعدة البيانات'
    : 'Your level has been saved to the database';
}

async function saveResult(level, categoryPercentages) {
  const studentId = currentStudent.user_id;

  // Save to localStorage first
  const students = JSON.parse(localStorage.getItem('elh_students') || '[]');
  const idx = students.findIndex(s => s.user_id === studentId);
  if (idx !== -1) {
    students[idx].level = level;
    students[idx].test_scores = categoryPercentages;
    localStorage.setItem('elh_students', JSON.stringify(students));
  }

  const current = JSON.parse(localStorage.getItem('elh_current_student') || '{}');
  current.level = level;
  current.test_scores = categoryPercentages;
  localStorage.setItem('elh_current_student', JSON.stringify(current));

  // Save to Supabase
  if (supabase && SUPABASE_URL !== 'https://rwtdoefmhwaakrxmwklb.supabase.co') {
    try {
      const { error } = await supabase
        .from('students')
        .update({
          level: level,
          test_scores: categoryPercentages,
          test_completed: true,
          test_date: new Date().toISOString()
        })
        .eq('user_id', studentId);

      if (error) console.warn('Supabase update error:', error);
    } catch (e) {
      console.warn('Supabase error:', e);
    }
  }
}

// ======================================================================
// LANGUAGE
// ======================================================================
let currentLang = 'ar';

function toggleLanguage() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  const html = document.documentElement;
  html.lang = currentLang;
  html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('langLabel').textContent = currentLang === 'ar' ? 'English' : 'عربي';

  document.querySelectorAll('[data-ar]').forEach(el => {
    const text = currentLang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
    if (text) el.textContent = text;
  });

  // Re-render if mid-test
  if (currentQuestion && questionIndex < TOTAL_QUESTIONS) {
    renderQuestion();
  }
}
